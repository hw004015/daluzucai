<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>达鲁足彩 · 2026世界杯</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--card:#12121f;--card2:#181829;--gold:#f0c040;--red:#e8755a;--teal:#4ecdc4;--w:#e8e8f0;--g:#8888a0;--border:rgba(255,255,255,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--w);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:16px}
header{text-align:center;padding:28px 16px 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
header h1{font-size:clamp(22px,4vw,34px);font-weight:900;background:linear-gradient(135deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-size:13px;color:var(--g);margin-top:4px}
.tab-nav{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:22px;position:sticky;top:8px;z-index:10;background:rgba(10,10,20,0.9);backdrop-filter:blur(10px);padding:6px;border-radius:12px;border:1px solid var(--border)}
.tab-btn{padding:8px 14px;border:none;background:transparent;color:var(--g);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
.tab-btn:hover{background:var(--card2);color:var(--w)}
.tab-btn.active{background:var(--gold);color:#1a1a00}
.tab-panel{display:none;animation:fi .3s ease}
.tab-panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .num{font-size:36px;font-weight:900}
.num.gold{color:var(--gold)}.num.teal{color:var(--teal)}.num.red{color:var(--red)}
.stat-card .label{font-size:12px;color:var(--g);margin-top:4px}
.section-title{font-size:18px;font-weight:700;margin:24px 0 12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:16px;background:var(--gold);border-radius:2px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.team-tag{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;font-size:12px;font-weight:600}
.team-tag.q{border-color:rgba(78,205,196,0.3);background:rgba(78,205,196,0.06)}
.team-tag .flag{font-size:24px;display:block;margin-bottom:2px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.match-card.played{border-left:3px solid var(--teal)}
.match-card.upcoming{border-left:3px solid var(--gold)}
.match-card .date-badge{font-size:11px;color:var(--g);min-width:70px;text-align:center}
.match-card .teams{flex:1;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;min-width:180px}
.match-card .score{font-size:20px;font-weight:900;min-width:50px;text-align:center;color:var(--gold);letter-spacing:3px}
.match-card .badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge.win{background:rgba(78,205,196,0.15);color:var(--teal)}
.badge.up{background:rgba(240,192,64,0.12);color:var(--gold)}
.match-card .info{font-size:11px;color:var(--g);min-width:80px;text-align:right}
.date-header{font-size:13px;font-weight:700;color:var(--gold);margin:14px 0 6px;padding:4px 0;border-bottom:1px solid var(--border)}
.tool-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.tool-section h3{font-size:16px;margin-bottom:12px;color:var(--gold)}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:12px;color:var(--g);margin-bottom:4px}
.form-group select,.form-group input{width:100%;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--w);font-size:14px}
.btn{padding:8px 20px;background:var(--gold);color:#1a1a00;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}
.result-box{background:var(--card2);border-radius:8px;padding:14px;margin-top:10px;font-size:13px;line-height:1.8}
.highlight{color:var(--gold);font-weight:700;font-size:18px}
.bar-row{margin-bottom:12px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-fill.gold{background:var(--gold)}.bar-fill.teal{background:var(--teal)}.bar-fill.red{background:var(--red)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.bracket-container{overflow-x:auto;padding:10px 0}
.bracket{display:flex;gap:30px;min-width:850px;justify-content:center}
.bracket-round{display:flex;flex-direction:column;justify-content:center;gap:8px;min-width:150px}
.bracket-round .round-title{font-size:11px;color:var(--g);text-align:center;margin-bottom:6px;letter-spacing:2px}
.bracket-slot{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px}
.bracket-slot.win{border-color:rgba(78,205,196,0.4);background:rgba(78,205,196,0.06)}
.bracket-slot.tbd{border-style:dashed;color:var(--g)}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border:1px solid var(--border);background:transparent;color:var(--g);border-radius:16px;cursor:pointer;font-size:12px}
.filter-btn.active{background:var(--gold);color:#1a1a00;border-color:var(--gold)}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;background:var(--card2);border:1px solid var(--border);border-radius:16px;cursor:pointer;font-size:12px;color:var(--g);user-select:none}
.chip.selected{background:rgba(240,192,64,0.15);border-color:var(--gold);color:var(--gold)}
.tip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;font-size:12px}
.tip-grid div{background:var(--card2);padding:10px;border-radius:8px}
details{margin-bottom:16px}
details summary{font-size:12px;color:var(--g);cursor:pointer}
@media(max-width:768px){
  .container{padding:8px}
  .tab-btn{padding:6px 10px;font-size:11px}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .match-card{flex-direction:column;align-items:flex-start;gap:6px}
  .match-card .info{text-align:left}
  .bracket{min-width:650px;gap:18px;font-size:11px}
  .stats-grid{grid-template-columns:1fr}
}
</style>
</head>

</div>

// ==================== SCHEDULE ====================
function RM(f){
  const el=document.getElementById('matchList');
  let ms=M; if(f==='played') ms=P; if(f==='upcoming') ms=U;
  const gr={}; ms.forEach(m=>{const k=m.d+' '+m.st;if(!gr[k])gr[k]=[];gr[k].push(m);});
  let h='';
  for(const[k,ml] of Object.entries(gr)){
    h+=`<div class="date-header">📅 ${k}</div>`;
    ml.forEach(m=>{
      if(m.p){
        h+=`<div class="match-card played"><div class="date-badge">${m.d}<br>${m.t}</div><div class="teams"><span class="flag">${m.hf}</span>${m.h} <span class="score">${m.hs}-${m.as}</span> ${m.a}<span class="flag">${m.af}</span></div><div class="badge win">✅ ${m.w}晋级${m.pk?' PK'+m.pk:''}</div><div class="info"><div class="scorers">⚽ ${m.s}</div>${m.v}</div></div>`;
      } else {
        h+=`<div class="match-card upcoming"><div class="date-badge">${m.d}<br>${m.t}</div><div class="teams"><span class="flag">${m.hf}</span>${m.h} <span style="color:var(--g)">vs</span> ${m.a}<span class="flag">${m.af}</span></div><div class="badge up">🔮 待赛</div><div class="info">${m.v}</div></div>`;
      }
    });
  }
  el.innerHTML=h;
}

// ==================== CALCULATORS ====================
function calcReturn(){
  const st=parseFloat(document.getElementById('calcStake').value)||0;
  const od=parseFloat(document.getElementById('calcOdds').value)||0;
  const ret=(st*od).toFixed(2),pf=(ret-st).toFixed(2);
  document.getElementById('calcReturnResult').innerHTML=`投注<strong>${st}</strong>元 → 回报<span class="highlight">${ret}</span>元<br>盈利<span style="color:${pf>=0?'var(--teal)':'var(--red)'};font-size:16px">${pf>=0?'+'+pf:pf}</span>元 · 回报率<strong>${Math.round(pf/st*100)}%</strong>`;
}
function calcParlay(){
  const st=parseFloat(document.getElementById('parlayStake').value)||0;
  const od=document.getElementById('parlayOdds').value.split(',').map(o=>parseFloat(o.trim())).filter(o=>!isNaN(o)&&o>0);
  if(od.length<2){document.getElementById('parlayCalcResult').innerHTML='<span style="color:var(--red)">至少输入2个赔率</span>';return;}
  const to=od.reduce((a,b)=>a*b,1),ret=(st*to).toFixed(2),pf=(ret-st).toFixed(2);
  document.getElementById('parlayCalcResult').innerHTML=`${od.length}串1 组合赔率<span class="highlight">${to.toFixed(2)}</span><br>投注<strong>${st}</strong>元 → 预期回报<span class="highlight">${ret}</span>元<br>盈利<span style="color:${pf>=0?'var(--teal)':'var(--red)'};font-size:16px">${pf>=0?'+'+pf:pf}</span>元<br><span style="font-size:10px;color:var(--g)">每多串一场中奖概率指数级下降</span>`;
}
function calcPL(){
  const ts=parseFloat(document.getElementById('plStake').value)||0,tr=parseFloat(document.getElementById('plReturn').value)||0;
  const pf=tr-ts,roi=ts>0?(pf/ts*100).toFixed(1):0,e=pf>0?'🟢':pf<0?'🔴':'⚪';
  document.getElementById('plResult').innerHTML=`${e} 总盈亏<span style="color:${pf>=0?'var(--teal)':'var(--red)'};font-size:20px;font-weight:900">${pf>=0?'+'+pf.toFixed(2):pf.toFixed(2)}</span>元<br>ROI <strong>${roi}%</strong><br><span style="font-size:10px;color:var(--g)">${pf>0?'继续保持！':'注意控制风险'}</span>`;
}
function calcProb(){
  const ps=document.getElementById('probInput').value.split(',').map(p=>parseFloat(p.trim())).filter(p=>!isNaN(p)&&p>0);
  if(ps.length!==3||Math.abs(ps.reduce((a,b)=>a+b,0)-100)>5){document.getElementById('probResult').innerHTML='<span style="color:var(--red)">输入3个概率值(胜,平,负)总和约100%</span>';return;}
  const sm=ps.reduce((a,b)=>a+b,0),od=ps.map(p=>(100/(p/sm*100)).toFixed(2));
  document.getElementById('probResult').innerHTML=`胜${(ps[0]/sm*100).toFixed(0)}%→赔率<span class="highlight">${od[0]}</span> | 平${(ps[1]/sm*100).toFixed(0)}%→赔率<span class="highlight">${od[1]}</span> | 负${(ps[2]/sm*100).toFixed(0)}%→赔率<span class="highlight">${od[2]}</span><br><span style="font-size:10px;color:var(--g)">注：实际赔率含庄家利润约5-10%</span>`;
}
